<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192" shape-rendering="crispEdges">
  <!-- 天空背景 -->
  <rect width="192" height="192" fill="#7EC0EE"/>
  <!-- 雲 -->
  <rect x="20" y="22" width="40" height="6" fill="#FFFFFF" opacity="0.85"/>
  <rect x="14" y="28" width="52" height="6" fill="#FFFFFF" opacity="0.85"/>
  <rect x="120" y="14" width="44" height="6" fill="#FFFFFF" opacity="0.85"/>
  <rect x="126" y="20" width="38" height="6" fill="#FFFFFF" opacity="0.85"/>

  <!-- Grass block 主體 -->
  <!-- 草地頂部高光 -->
  <rect x="24" y="48" width="144" height="6" fill="#A8E060"/>
  <!-- 草地 -->
  <rect x="24" y="54" width="144" height="34" fill="#5D8A3A"/>
  <!-- 草簇 -->
  <rect x="36" y="54" width="6" height="6" fill="#7FB040"/>
  <rect x="60" y="54" width="6" height="6" fill="#7FB040"/>
  <rect x="96" y="54" width="6" height="6" fill="#7FB040"/>
  <rect x="132" y="54" width="6" height="6" fill="#7FB040"/>
  <rect x="156" y="54" width="6" height="6" fill="#7FB040"/>
  <!-- 泥土 -->
  <rect x="24" y="88" width="144" height="56" fill="#8B5A2B"/>
  <!-- 泥土斑塊 -->
  <rect x="36" y="100" width="14" height="8" fill="#5A3A1A"/>
  <rect x="80" y="112" width="20" height="6" fill="#A67B4A"/>
  <rect x="120" y="96" width="12" height="10" fill="#5A3A1A"/>
  <rect x="48" y="124" width="16" height="6" fill="#A67B4A"/>
  <rect x="130" y="128" width="14" height="6" fill="#5A3A1A"/>
  <!-- 邊框（深色陰影 + 亮邊） -->
  <rect x="24" y="48" width="144" height="4" fill="#A8E060"/>
  <rect x="24" y="48" width="4" height="96" fill="#A8E060" opacity="0.5"/>
  <rect x="164" y="48" width="4" height="96" fill="#3D5E23"/>
  <rect x="24" y="140" width="144" height="4" fill="#5A3A1A"/>

  <!-- 鑽石劍（左下到右上斜放） -->
  <g transform="translate(96 100) rotate(-32)">
    <!-- 劍柄 -->
    <rect x="-4" y="22" width="8" height="22" fill="#8B5A2B"/>
    <rect x="-4" y="22" width="2" height="22" fill="#A67B4A"/>
    <rect x="2" y="22" width="2" height="22" fill="#5A3A1A"/>
    <!-- 劍格 -->
    <rect x="-12" y="14" width="24" height="8" fill="#FFC830"/>
    <rect x="-12" y="14" width="24" height="2" fill="#FFE066"/>
    <rect x="-12" y="20" width="24" height="2" fill="#B8860B"/>
    <!-- 劍刃 -->
    <rect x="-4" y="-50" width="8" height="64" fill="#A8E5FF"/>
    <rect x="-4" y="-50" width="2" height="64" fill="#FFFFFF"/>
    <rect x="2" y="-50" width="2" height="64" fill="#5DA8DD"/>
    <!-- 劍尖 -->
    <polygon points="-4,-50 0,-58 4,-50" fill="#A8E5FF"/>
    <polygon points="-4,-50 0,-58 0,-50" fill="#FFFFFF"/>
  </g>

  <!-- 文字 ABC -->
  <g font-family="'Press Start 2P', monospace" font-weight="bold" font-size="22" text-anchor="middle">
    <text x="98" y="178" fill="#000000">ABC</text>
    <text x="96" y="176" fill="#FFD700">ABC</text>
  </g>
</svg>
